<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Una carta para ti ❤️</title>

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css.css">

</head>

<body>

    <!-- Fondo -->
    <div class="background"></div>


    <!-- Pantalla del sobre -->
    <section id="inicio">

        <div class="envelope" onclick="abrirCarta()">

            <div class="top"></div>

            <div class="body"></div>

            <div class="heart">💜</div>

            <p>Ábreme</p>

        </div>

    </section>


    <!-- Carta -->
    <section id="carta">

        <div class="paper">

            <h1>Para Ti ❤️</h1>

            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>

            <div id="mensaje">

                Mi amor ❤️,
                <br><br>
                Esta pequeña carta es para recordarte lo especial que eres para mí.
                Gracias por cada momento, cada sonrisa y cada recuerdo que hemos creado juntos.

            </div>

        </div>

    </section>


    <!-- JavaScript -->
    <script src="script.js.js"></script>

</body>

</html>
